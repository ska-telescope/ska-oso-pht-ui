{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
{{ include "ska-oso-pht-ui.labels" . | indent 4 }}
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  labels:
{{ include "ska-oso-pht-ui.labels" . | indent 4 }}
  name: {{ $.Chart.Name }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: {{ $.Chart.Name }}-service
            port:
              number: 80
        # Match everything but '/oso' which is reserved for back-end
        path: {{ include "ska-oso-pht-ui.ingress.path" . }}/(?!oso)(.*)
        pathType: ImplementationSpecific
---
# Redirect the bare base path (no trailing slash) to the canonical path.
# Indigo IAM strips trailing slashes from redirect_uri; the configuration-snippet
# fires inside the matched location block so nginx variables and query string are preserved.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
{{ include "ska-oso-pht-ui.labels" . | indent 4 }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      return 301 $scheme://$host$uri/$is_args$args;
  labels:
{{ include "ska-oso-pht-ui.labels" . | indent 4 }}
  name: {{ $.Chart.Name }}-base-redirect-ingress
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: {{ $.Chart.Name }}-service
            port:
              number: 80
        path: {{ include "ska-oso-pht-ui.ingress.path" . }}
        pathType: Exact

{{- end }}
