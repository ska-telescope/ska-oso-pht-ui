{{- if $.Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
{{ include "ska-oso-pht-ui.labels" . | indent 4 }}
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  labels:
{{ include "ska-oso-pht-ui.labels" . | indent 4 }}
  name: {{ $.Chart.Name }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: {{ $.Chart.Name }}-service
            port:
              number: 80
        # Match everything but '/oso' which is reserved for back-end
        path: {{ include "ska-oso-pht-ui.ingress.path" . }}/(?!oso)(.*)
        pathType: ImplementationSpecific


{{- /* BTN-3402: workaround removed — REACT_APP_SKA_PHT_BASE_URL now includes a trailing
slash so MSAL never navigates back to the slashless path. Delete this block once confirmed.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      return 301 $scheme://$host$uri/$is_args$args;
  name: {{ $.Chart.Name }}-base-redirect-ingress
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: {{ $.Chart.Name }}-service
            port:
              number: 80
        path: {{ include "ska-oso-pht-ui.ingress.path" . }}
        pathType: Exact
*/ -}}

{{- end }}
