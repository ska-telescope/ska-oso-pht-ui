
# Configure Ingress
ingress:
  enabled: true
  prependByNamespace: true
  path: pht

runtimeEnv:
  skipPreflightCheck: "true"
  skaOsoServicesUrl: ""
  skaSensitivityCalcUrl: ""
  useLocalData: "false"
  domain: "https://sdhp.stfc.skao.int"
  skaLoginAppUrl: ""
  msentraRedirectUri: ""
  useIndigo: false
  indigoAuthority: "https://iam-1.staging.devx.skao.int/"
  indigoClientId: "ad5fcc0b-acd2-40a9-af5d-a27604fd903b"
  indigoRedirectUri: ""
  indigoScope: "pht:readwrite openid profile"
  indigoAudience: "test:pht"
  indigoApiScope: "pht:readwrite openid profile"

component: pht-ui
function: ui
domain: operations
enabled: true
image:
  registry: artefact.skao.int
  image: ska-oso-pht-ui
  tag: ~
  pullPolicy: IfNotPresent

vault:
  enabled: true
  mount: dev
  secretPath: "stargazers/ska-oso-pht-ui"
  secretKeys:
  - "MSENTRA_CLIENT_ID"
  - "MSENTRA_TENANT_ID"